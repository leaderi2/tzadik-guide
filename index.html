<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>לימוד יהדות</title>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Almarai', sans-serif;
            margin: 0;
            background: #f5f5f5;
            color: #333;
            padding-top: 50px;
        }

        #top-bar {
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            font-weight: bold;
            z-index: 5000;
            background: #f5f5f5;
        }

        #bsd {
            color: #1e3a8a;
        }

        #hebrew-date {
            color: #1e3a8a;
        }

        #daily-mitzvot {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: none;
        }

        #daily-mitzvot h2 {
            margin-top: 0;
            color: #1e3a8a;
        }

        .mitzvah-item {
            margin: 8px 0;
            font-size: 16px;
        }

        /* ===== מסך כניסה ===== */
        #entrance-screen {
            background: #1e3a8a; /* כחול */
            color: white;
            height: 100vh; /* מלא מסך */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #entrance-screen h1 {
            font-size: 48px;
            margin-bottom: 40px;
        }

        #entrance-screen button {
            width: 200px;
            padding: 15px;
            margin: 10px 0;
            font-size: 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #2563eb;
            color: white;
            transition: background 0.3s;
        }

        #entrance-screen button:hover {
            background: #1d4ed8;
        }

        /* ===== מסך ראשי ===== */
        header {
            background: #1e3a8a;
            color: white;
            padding: 60px 20px;
            text-align: center;
            display: none; /* יופיע אחרי בחירת מין */
        }

        header h1 {
            font-size: 48px;
            margin: 0;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px;
            display: none; /* יופיע אחרי בחירת מין */
        }

        nav button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        nav button:hover {
            background: #1d4ed8;
        }

        .section {
            display: none;
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 10px;
        }

        .active {
            display: block;
        }

        footer {
            text-align: center;
            margin: 30px;
            color: #666;
            display: none; /* יופיע אחרי בחירת מין */
        }

        .wheel-container {
            text-align: center;
            position: relative;
            width: 420px;
            margin: auto;
        }

        /* כפתור אדום במרכז */
        .spin-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            width: 70px;
            height: 70px;

            border-radius: 50%;
            border: none;

            background: red;
            cursor: pointer;
            z-index: 10;
        }

        /* חץ קטן למעלה */
        .arrow {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);

            width: 0;
            height: 0;

            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 20px solid red;

            z-index: 10;
        }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #1e3a8a;
            color: white;
            padding: 25px 40px;
            border-radius: 15px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: 0.3s ease;
            z-index: 6000;
        }

        .popup.show {
            transform: translate(-50%, -50%) scale(1);
        }
    </style>
</head>
<body>

<div id="top-bar">
    <div id="bsd">בס״ד</div>
    <div id="hebrew-date"></div>
</div>
<!-- ===== מסך כניסה ===== -->
<div id="entrance-screen">
    <h1>שלום צדיקים! אשרייכם!</h1>
    <button onclick="selectGender('male')">זכר</button>
    <button onclick="selectGender('female')">נקבה</button>
</div>

<!-- ===== מסך ראשי ===== -->
<header id="main-header">
    <h1 id="welcome-text">שלום צדיק!</h1>
</header>

<div id="daily-mitzvot">
    <h2>מצוות היום</h2>
    <div id="mitzvot-list"></div>
</div>

<nav id="main-nav">
    <button onclick="show('tanach')">תנ״ך</button>
    <button onclick="show('year')">מעגל השנה</button>
    <button onclick="show('mitzvot')">ברכות ומצוות</button>
</nav>

<!-- ===== Sections ===== -->
<div id="tanach" class="section">
    <h2>תנ״ך</h2>
    <ul>
        <li>ספרי התורה</li>
        <li>נביאים</li>
        <li>כתובים</li>
        <li>דמויות מרכזיות בתנ״ך</li>
    </ul>
</div>

<div id="year" class="section">

<h2>מעגל השנה – גלגל החודשים</h2>

<div class="wheel-container">

    <!-- חץ אדום למעלה -->
    <div class="arrow"></div>

    <canvas id="wheelCanvas" width="420" height="420"></canvas>

    <!-- כפתור אדום עגול במרכז -->
    <button class="spin-btn" onclick="spinWheel()"></button>

</div>

</div>

<div id="mitzvot" class="section">
    <h2>ברכות</h2>
    <div id="brachot-list"></div>
    <div id="bracha-text" style="margin-top:20px;"></div>
</div>


<div id="popup" class="popup">שכוייח!!! 🎉</div>

<footer id="main-footer">
    <p>נוצר באהבה ללימוד היהדות ✡</p>
</footer>

<script>

const mitzvotMale = [
"מודה אני",
"נטילת ידיים בבוקר",
"ברכות השחר",
"ברכת התורה",
"תפילת שחרית",
"קריאת שמע",
"הנחת תפילין",
"תפילת מנחה",
"תפילת ערבית",
"קריאת שמע שעל המיטה",
"ברכות לפני ואחרי אכילה",
];

const mitzvotFemale = [
"מודה אני",
"נטילת ידיים בבוקר",
"ברכות השחר",
"תפילה אחת ביום",
"קריאת שמע",
"ברכות לפני ואחרי אכילה",
];

function getTodayKey() {
    const today = new Date();
    return today.toISOString().split('T')[0];
}

function loadMitzvot(gender) {

    document.getElementById("daily-mitzvot").style.display = "block";

    const list = document.getElementById("mitzvot-list");
    list.innerHTML = "";

    const todayKey = getTodayKey();
    const saved = JSON.parse(localStorage.getItem("mitzvot-" + todayKey)) || {};

    const mitzvot = gender === "male" ? mitzvotMale : mitzvotFemale;

    mitzvot.forEach((m, i) => {

        const div = document.createElement("div");
        div.className = "mitzvah-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.id = "m" + i;
        checkbox.checked = saved[i] || false;

        checkbox.addEventListener("change", () => {
            saved[i] = checkbox.checked;
            localStorage.setItem("mitzvot-" + todayKey, JSON.stringify(saved));

            if (checkbox.checked) {
                showPopup();
            }
        });

        const label = document.createElement("label");
        label.htmlFor = checkbox.id;
        label.textContent = " " + m;

        div.appendChild(checkbox);
        div.appendChild(label);
        list.appendChild(div);
    });
}

const brachotFiles = {
"מודה אני": {
    "file": "brachot/mode_ani.txt"
},
"ברכות השחר": {
    "file": "brachot/brachot_hashachar.txt"
},
"ברכת התורה": {
    "file": "brachot/brachat_hatora.txt"
},
"קריאת שמע": {
    "file": "brachot/kriat_shema.txt"
},
"ברכת המזון": {
    "file": "brachot/birkat_hamazon.txt"
},
"אשר יצר": {
    "file": "brachot/asher_yatzar.txt"
}
};

function loadBrachot() {

    const listDiv = document.getElementById("brachot-list");
    const textDiv = document.getElementById("bracha-text");

    listDiv.innerHTML = "";
    textDiv.innerHTML = "";

    Object.keys(brachot).forEach(name => {

        const btn = document.createElement("button");
        btn.textContent = name;
        btn.style.margin = "5px";
        btn.style.padding = "8px 12px";
        btn.style.borderRadius = "8px";
        btn.style.border = "none";
        btn.style.background = "#2563eb";
        btn.style.color = "white";
        btn.style.cursor = "pointer";

        btn.onclick = async () => {

            const filePath = brachotFiles[name]["file"];

            const response = await fetch(filePath);
            const text = await response.text();

            textDiv.innerHTML =
                "<div style='background:white;padding:25px;border-radius:15px;line-height:2.2;font-size:20px;'>" +
                text.replace(/\n/g, "<br>") +
                "</div>";
        };

        listDiv.appendChild(btn);
    });
}

function show(id) {
    if (id === "mitzvot") {
        loadBrachot();
    }
    const sections = document.querySelectorAll('.section');
    sections.forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function selectGender(gender) {
    // Hide entrance screen
    document.getElementById('entrance-screen').style.display = 'none';

    // Show main content
    document.getElementById('main-header').style.display = 'block';
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('main-footer').style.display = 'block';

    // Set welcome text
    const welcome = document.getElementById('welcome-text');
    if (gender === 'male') {
        welcome.textContent = 'שלום צדיק!';
    } else {
        welcome.textContent = 'שלום צדיקה!';
    }
    localStorage.setItem("gender", gender);

    loadMitzvot(gender);
}

function numberToHebrewLetters(num) {

    // תיקון מיוחד לט״ו וט״ז
    if (num === 15) return "טו";
    if (num === 16) return "טז";

    const units = ["","א","ב","ג","ד","ה","ו","ז","ח","ט"];
    const tens = ["","י","כ","ל","מ","נ","ס","ע","פ","צ"];
    const hundreds = ["","ק","ר","ש","ת","תק","תר","תש","תת","תתק"];

    let result = "";

    if (num >= 100) {
        result += hundreds[Math.floor(num / 100)];
        num = num % 100;
    }

    if (num >= 10) {
        result += tens[Math.floor(num / 10)];
        num = num % 10;
    }

    if (num > 0) {
        result += units[num];
    }

    return result;
}

function convertHebrewYear(year) {
    const thousands = Math.floor(year / 1000);
    const remainder = year % 1000;

    return numberToHebrewLetters(thousands) + "׳" +
           numberToHebrewLetters(remainder);
}

function updateHebrewDate() {

    const today = new Date();

    const day = parseInt(
        today.toLocaleDateString('he-IL-u-ca-hebrew', { day: 'numeric' })
    );

    const month = today.toLocaleDateString(
        'he-IL-u-ca-hebrew',
        { month: 'long' }
    );

    const year = parseInt(
        today.toLocaleDateString('he-IL-u-ca-hebrew', { year: 'numeric' })
    );

    const hebrewDay = numberToHebrewLetters(day);
    const hebrewYear = convertHebrewYear(year);

    document.getElementById("hebrew-date").textContent =
        hebrewDay + " ב" + month + " " + hebrewYear;
}

updateHebrewDate();

const months = [
"תשרי","חשוון","כסלו","טבת","שבט","אדר",
"ניסן","אייר","סיון","תמוז","אב","אלול"
];

const monthInfo = {

"תשרי":
"חודש החגים – תחילת השנה העברית והחודש העמוס ביותר.\n\n" +
"אירועים:\n" +
"• ראש השנה (א'-ב' בתשרי)\n" +
"• צום גדליה (ג' בתשרי)\n" +
"• יום כיפור (י' בתשרי)\n" +
"• סוכות (ט\"ו בתשרי)\n" +
"• שמיני עצרת / שמחת תורה (כ\"ב בתשרי)",

"חשוון":
"מכונה גם מר-חשוון כי אין בו חגים.\nחודש של שגרה ותחילת הגשמים.\n\n" +
"אירועים:\n" +
"• יום הזיכרון ליצחק רבין (י\"ב בחשוון)\n" +
"• חג הסיגד (כ\"ט בחשוון)",

"כסלו":
"חודש החושך והאור.\nהימים מתקצרים ומדליקים בהם נרות חנוכה.\n\n" +
"אירועים:\n" +
"• חנוכה (מתחיל בכ\"ה בכסלו ונמשך שמונה ימים)",

"טבת":
"שיא החורף.\nחודש המזוהה עם תחילת המצור על ירושלים.\n\n" +
"אירועים:\n" +
"• צום עשרה בטבת – יום הקדיש הכללי",

"שבט":
"חודש של התעוררות הטבע בארץ ישראל.\n\n" +
"אירועים:\n" +
"• ט\"ו בשבט – ראש השנה לאילנות",

"אדר":
"חודש השמחה והנהפוך-הוא.\n\"משנכנס אדר מרבין בשמחה\".\n\n" +
"אירועים:\n" +
"• תענית אסתר (י\"ג באדר)\n" +
"• פורים (י\"ד באדר, ובמוקפות חומה בט\"ו)",

"ניסן":
"חודש האביב – חודש של גאולה והתחדשות.\n\n" +
"אירועים:\n" +
"• פסח (ט\"ו בניסן)\n" +
"• יום הזיכרון לשואה ולגבורה (כ\"ז בניסן)",

"אייר":
"חודש של מעבר בין פסח לשבועות.\nמאופיין בספירת העומר ובימי זיכרון ותקומה.\n\n" +
"אירועים:\n" +
"• יום הזיכרון לחללי מערכות ישראל (ד' באייר)\n" +
"• יום העצמאות (ה' באייר)\n" +
"• ל\"ג בעומר (י\"ח באייר)\n" +
"• יום ירושלים (כ\"ח באייר)",

"סיון":
"חודש מתן תורה והבשלת הביכורים.\n\n" +
"אירועים:\n" +
"• חג השבועות (ו' בסיוון)",

"תמוז":
"תחילת הקיץ הלוהט.\nחודש תחילת ימי החורבן.\n\n" +

"• צום י\"ז בתמוז – תחילת בין המצרים",

"אלול":

let angle = 0;

function drawWheel() {
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const radius = canvas.width / 2;

    ctx.clearRect(0,0,420,420);

    months.forEach((m, i) => {
        const start = (2 * Math.PI / 12) * i + angle;
        const end = start + 2 * Math.PI / 12;

        ctx.beginPath();
        ctx.moveTo(radius, radius);
        ctx.arc(radius, radius, radius, start, end);
        ctx.fillStyle = i % 2 === 0 ? "#93c5fd" : "#bfdbfe";
        ctx.fill();

        ctx.save();
        ctx.translate(radius, radius);
        ctx.rotate(start + Math.PI / 12);
        ctx.textAlign = "right";
        ctx.fillStyle = "black";
        ctx.font = "16px Arial";
        ctx.fillText(m, radius - 10, 5);
        ctx.restore();
    });
}

/* חישוב החודש שמול החץ */
function getSelectedMonth() {

    // לנרמל את הזווית לטווח 0–2π
    let a = angle % (2 * Math.PI);
    if (a < 0) a += 2 * Math.PI;

    // כי החץ למעלה ולא בצד ימין
    a = a + Math.PI / 2;

    const sector = (2 * Math.PI) / 12;

    let index = Math.floor((2 * Math.PI - a) / sector) % 12;

    return months[index];
}

function spinWheel() {
    let spins = Math.random() * 200 + 200;

    const interval = setInterval(() => {
        angle += 0.1;
        spins--;
        drawWheel();

        if (spins <= 0) {
            clearInterval(interval);
            showMonth();
        }
    }, 10);
}

function showMonth() {
    const month = getSelectedMonth();

    alert(
        month + "\n\n" +
        monthInfo[month]
    );
}

/* לחיצה על הגלגל = אותו חודש בדיוק */
document.getElementById("wheelCanvas").addEventListener("click", function(e) {

    const canvas = this;
    const rect = canvas.getBoundingClientRect();

    const x = e.clientX - rect.left - canvas.width / 2;
    const y = e.clientY - rect.top - canvas.height / 2;

    let clickAngle = Math.atan2(y, x);
    if (clickAngle < 0)
        clickAngle += 2 * Math.PI;

    // התחשבות בסיבוב הנוכחי
    let realAngle = clickAngle - angle;
    if (realAngle < 0)
        realAngle += 2 * Math.PI;

    const sector = (2 * Math.PI) / 12;

    let index = Math.floor(realAngle / sector);

    index = ((index % 12) + 12) % 12;

    const month = months[index];

    if (!month) {
        console.log("index:", index, "angle:", realAngle);
        return;
    }

    alert(
        month + "\n\n" +
        monthInfo[month]
    );
});

drawWheel();

function showPopup() {
    const popup = document.getElementById("popup");
    popup.classList.add("show");

    setTimeout(() => {
        popup.classList.remove("show");
    }, 1000);
}

</script>


</body>
</html>
